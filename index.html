<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />

    <title>Frontend Mentor | Pod request access landing page</title>
  </head>
  <body>
    <nav class="nav container">
      <a href="./" class="logo">
        <img src="./assets/desktop/logo.svg" alt="Pod logo" />
      </a>
    </nav>

    <div class="hero-info container">
      <h1 class="font-title primary">
        Publish your podcasts <span class="neutral-0">everywhere.</span>
      </h1>

      <p class="font-body neutral-100">
        Upload your audio to Pod with a single click. We’ll then distribute your
        podcast to Spotify, Apple Podcasts, Google Podcasts, Pocket Casts and
        more!
      </p>

      <div class="email-sub">
        <input type="text" placeholder="Email address" />
        <button>Request access</button>
      </div>
      <ul class="partners-logos">
        <li><img src="./assets/desktop/spotify.svg" alt="Spotify logo" /></li>
        <li>
          <img
            src="./assets/desktop/apple-podcast.svg"
            alt="Apple podcast logo"
          />
        </li>
        <li>
          <img
            src="./assets/desktop/google-podcasts.svg"
            alt="Google podcast logo"
          />
        </li>
        <li>
          <img
            src="./assets/desktop/pocket-casts.svg"
            alt="Pocket Casts logo"
          />
        </li>
      </ul>
    </div>
  </body>
</html>
